# vim:ft=kitty

## --- Eldritch Color Scheme ---
## A theme for the Ancient Ones!
foreground            #ebfafa
background            #171928
selection_foreground  #ebfafa
selection_background  #bf4f8e
url_color             #04d1f9

# black
color0  #21222c
color8  #7081d0
# red
color1  #f9515d
color9  #f16c75
# green
color2  #37f499
color10 #69F8B3
# yellow
color3  #e9f941
color11 #f1fc79
# blue
color4   #9071f4
color12  #a48cf2
# magenta
color5  #f265b5
color13 #FD92CE
# cyan
color6  #04d1f9
color14 #66e4fd
# white
color7  #ebfafa
color15 #ffffff

# Cursor colors
cursor            #37f499
cursor_text_color #f8f8f2

## --- Window Style & Blur ---
# This matches the high-transparency "glass" look 
background_opacity         0.75
background_blur            32
dynamic_background_opacity yes

# Padding creates the "breathing room" seen around the text in the photo
window_padding_width       15
placement_strategy         center

## --- Fonts ---
# Using the same font as your Waybar and Rofi for consistency
font_family      JetBrains Mono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

## --- Tab Bar (Matching the YouTube/Konsole style) ---
tab_bar_style              powerline
tab_powerline_style        slanted
active_tab_foreground      #171928
active_tab_background      #04d1f9
inactive_tab_foreground    #37f499
inactive_tab_background    #323449

## --- Mouse & URLS ---
detect_urls yes
copy_on_select yes
mouse_hide_wait 3.0

## --- Performance & Misc ---
repaint_delay    10
input_delay      3
sync_to_monitor  yes
confirm_os_window_close 0
enable_audio_bell no

# Splits/Windows
active_border_color   #a48cf2
inactive_border_color #171928