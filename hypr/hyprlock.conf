# Cache Folder
$ml4w_cache_folder = $HOME/.cache/ml4w/hyprland-dotfiles

# Source colors
source = colors.conf

general {
    ignore_empty_input = true
}

background {
    monitor =
    path = /home/aarush/Downloads/wallpapers/nord.jpg   # only png supported for now
    # Blur settings
    blur_passes = 2                # 0 disables blurring
    blur_size = 1
    noise = 0
    contrast = 1.5
    brightness = 0.8
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 200, 50
    dots_size = 0.20 
    dots_spacing = 0.75
    dots_center = true
    dots_rounding = -1 
    
    # --- Color Updates ---
    inner_color = rgb(0, 10, 30)        # A very deep, "super dark" Midnight Blue
    dots_color = rgb(150, 150, 150)    # A medium grey for the dots
    font_color = rgb(200, 200, 200)    # Light grey text for better contrast
    outer_color = rgba(0, 0, 0, 0)     # Optional: Set to transparent for a cleaner look
    # ---------------------

    outline_thickness = 3
    fade_on_empty = true
    fade_timeout = 1000 
    placeholder_text = <i>tell bruh</i> 
    hide_input = false
    rounding = 10 
    check_color = rgb(30, 50, 100)     # Darker blue during check
    fail_color = rgba(226, 92, 92, 1)      # Standard red for failure
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i> 
    
    position = 0, -20
    halign = center
    valign = center
    
    # Shadow settings (matching your previous vibe)
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgb(0, 0, 0)
    shadow_boost = 1.2
}

label {
    monitor =
    #clock
    text = cmd[update:1000] echo "$TIME"
    color = rgb(a2a2a2ff)
    font_size = 70
    font_family = Fira Sans Semibold
    position = -50, 20
    halign = right
    valign = bottom
    shadow_passes = 5
    shadow_size = 10
}

label {
    monitor =
    text = deezXnutz
    color = rgb(a2a2a2ff)
    font_size = 20
    font_family = Fira Sans Semibold
    position = -50, 120
    halign = right
    valign = bottom
    shadow_passes = 5
    shadow_size = 10
}

image {
    monitor =
    path = /home/aarush/Pictures/hyprlock/luffy.jpg
    size = 280 # lesser side if not 1:1 ratio
    rounding = 300 # negative values mean circle
    border_size = 4
    border_color = rgb(E8BCF0)
    rotate = 0 # degrees, counter-clockwise
    reload_time = -1 # seconds between reloading, 0 to reload with SIGUSR2
#    reload_cmd =  # command to get new path. if empty, old path will be used. don't run "follow" commands like tail -F
    position = 0, 200
    halign = center
    valign = center
     # Shadow settings (matching your previous vibe)
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgb(0, 0, 0)
    shadow_boost = 1.2
}